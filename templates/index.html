{% extends "base.html" %}

{% block title %}Home | Math Score Predictor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card app-card shadow p-5 text-center">

            <h1 class="mb-3">Student Math Score Prediction</h1>

            <p class="text-muted mb-4">
                Predict a student's <strong>Math Score</strong> using demographic
                and academic performance indicators such as reading and writing scores.
            </p>

            <div class="d-grid gap-2 col-6 mx-auto">
                <a href="{{ url_for('predict_datapoint') }}" class="btn btn-primary btn-lg">
                    Start Prediction
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
