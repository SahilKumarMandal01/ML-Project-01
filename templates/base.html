<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Math Score Predictor{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #eef1f4);
        }

        .app-card {
            border-radius: 12px;
        }

        .form-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #495057;
        }

        .result-box {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Math Score Predictor</a>
    </div>
</nav>

<div class="container my-5">
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3">
    <small>ML Prediction App • Flask • Scikit-learn</small>
</footer>

</body>
</html>
